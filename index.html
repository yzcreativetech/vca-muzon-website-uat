<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Victory Churches of Asia - Muzon</title>

  <link rel="stylesheet" href="css/vca_style.css"/>
</head>

<body>

  <main class="landing-page">

    <section class="landing-hero">

    <!-- Still image shown when user moves mouse -->
    <img
    src="assets/index/VCA_CHURCH.png"
    alt="VCA Muzon Church"
    class="landing-hero-image active-bg"
    id="churchImage">

    <div class="hero-video-container">
      <video
          class="hero-video"
          autoplay
          muted
          loop
          playsinline>

          <source src="assets/index/vca_index_hero.mp4" type="video/mp4">

      </video>

      <video
          class="hero-video"
          autoplay
          muted
          loop
          playsinline>

          <source src="assets/index/vca_index_hero_2.mp4" type="video/mp4">

      </video>

    </div>
    <div class="landing-overlay"></div>

    <div class="landing-content">
      <img src="assets/index/VCA_LOGO.png" alt="VCA Muzon Logo" class="landing-logo">

      <h1 class="landing-title">
        REACH.<br>
        TEACH.<br>
        MOBILIZE.
      </h1>

      <p class="landing-description">
        Reaching people with the Gospel of Jesus Christ.<br>
        Teaching believers to become like Christ.<br>
        Mobilizing God's people to impact the world.
      </p>

      <a href="home.html" class="landing-btn">
        EXPLORE VCA <span>→</span>
      </a>
    </div>

    </section>
  </main>
  <script src="js/vca_js.js"></script>
</body>
</html>
